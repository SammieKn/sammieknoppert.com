name: Deploy PR Preview to Cloudflare Workers

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pr-preview.yml"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build OpenNext bundle
        run: npx opennextjs-cloudflare build

      - name: Create PR-specific Wrangler config
        env:
          PREVIEW_WORKER_NAME: sammieknoppert-com-pr-${{ github.event.pull_request.number }}
        run: |
          node -e "const fs=require('fs'); try { const config=JSON.parse(fs.readFileSync('wrangler.jsonc','utf8')); config.name=process.env.PREVIEW_WORKER_NAME; fs.writeFileSync('wrangler.pr.json', JSON.stringify(config, null, 2) + '\n'); } catch (error) { console.error('Failed to prepare wrangler.pr.json:', error); process.exit(1); }"

      - name: Deploy preview worker
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          output=$(npx wrangler@4.60.0 deploy --config wrangler.pr.json 2>&1 | tee /dev/stderr)
          preview_url=$(echo "$output" | grep -Eo 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -n 1)

          if [ -z "$preview_url" ]; then
            echo "Failed to detect preview URL from wrangler output" >&2
            exit 1
          fi

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = "<!-- cloudflare-pr-preview -->";
            const body = [
              marker,
              "🚀 Cloudflare preview deployed.",
              "",
              `**Preview URL:** ${process.env.PREVIEW_URL}`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(
              (comment) =>
                comment.user.type === "Bot" &&
                comment.body &&
                comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
