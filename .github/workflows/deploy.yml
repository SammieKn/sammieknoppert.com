name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'  # Only run if files in frontend change

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Deploy
        # This runs the same command you run locally: "npm run deploy"
        run: npm run deploy
        working-directory: frontend
        env:
          # Pass the secrets into the environment so Wrangler can see them
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # If you use OpenNext, it helps to suppress interactive prompts
          CI: true